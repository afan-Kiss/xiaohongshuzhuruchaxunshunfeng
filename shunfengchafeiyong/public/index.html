<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>顺丰月结运费分析</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header class="head">
      <h1>顺丰月结运费分析</h1>
      <p class="sub">批量查丰桥清单运费，按扣费从高到低排序，找出物流费偏高的订单</p>
      <div id="statusBar" class="status-bar">正在检测丰桥配置…</div>
    </header>

    <section class="panel">
      <div class="tabs">
        <button type="button" class="tab active" data-tab="paste">粘贴运单号</button>
        <button type="button" class="tab" data-tab="csv">上传 Excel / CSV</button>
      </div>

      <div id="pane-paste" class="pane active">
        <label class="lbl">每行一个 SF 运单号，或混在文本里（自动识别 SF 开头单号）</label>
        <textarea id="pasteInput" rows="8" placeholder="SF1570908346262&#10;SF0218863429615"></textarea>
      </div>

      <div id="pane-csv" class="pane">
        <label class="lbl">支持千帆/Excel 导出 .xlsx、.xls、.csv，自动识别列：运单号、订单号、买家、实付金额</label>
        <input type="file" id="csvFile" accept=".csv,.txt,.tsv,.xlsx,.xls">
        <textarea id="csvPreview" rows="6" readonly placeholder="选择文件后预览…"></textarea>
      </div>

      <div class="actions">
        <button type="button" id="btnQuery" class="btn primary">开始查询并排序</button>
        <button type="button" id="btnExport" class="btn" disabled>导出结果 CSV</button>
        <span id="progress" class="progress"></span>
      </div>
    </section>

    <section id="summary" class="summary hidden">
      <div class="stat"><span class="k">运单数</span><span id="statCount" class="v">0</span></div>
      <div class="stat"><span class="k">查成功</span><span id="statOk" class="v">0</span></div>
      <div class="stat"><span class="k">月结合计</span><span id="statTotal" class="v">¥0</span></div>
      <div class="stat"><span class="k">平均运费</span><span id="statAvg" class="v">¥0</span></div>
      <div class="stat warn"><span class="k">最高一单</span><span id="statMax" class="v">¥0</span></div>
    </section>

    <section class="table-wrap">
      <table id="resultTable">
        <thead>
          <tr>
            <th>#</th>
            <th>月结扣费 ↓</th>
            <th>运单号</th>
            <th>订单号</th>
            <th>买家</th>
            <th>实付</th>
            <th>线路</th>
            <th>计费重</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="resultBody">
          <tr><td colspan="9" class="empty">导入运单后点击「开始查询并排序」</td></tr>
        </tbody>
      </table>
    </section>

    <footer class="foot">
      <p>丰桥接口：EXP_RECE_QUERY_SFWAYBILL · 凭证来自服务器 config.json · 路径 /shunfengchafeiyong</p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
